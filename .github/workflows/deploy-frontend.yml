name: Deploy frontend

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-frontend.yml"
      - "Dockerfile"
      - "Dockerfile.runtime"
      - "nginx.conf"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "eslint.config.js"
      - "index.html"
      - "src/**"
      - "public/**"
      - "amplify/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/personal-portfolio-frontend
  CONTAINER_NAME: hom-central-ui
  VITE_API_URL: ${{ vars.VITE_API_URL || 'http://18.222.93.147:3000' }}
  VITE_EVIDENCE_API_BASE_URL: ${{ vars.VITE_EVIDENCE_API_BASE_URL || '/evidence-api' }}
  VITE_EVIDENCE_AUTH_MODE: ${{ vars.VITE_EVIDENCE_AUTH_MODE || 'cognito' }}
  VITE_AWS_REGION: ${{ vars.VITE_AWS_REGION || 'us-east-2' }}
  VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID || 'us-east-2_SfO4Yq5qb' }}
  VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ vars.VITE_COGNITO_USER_POOL_CLIENT_ID || '46hn6m1uviifa47b3ogrhg7lg8' }}
  EC2_DEPLOY_HOST: ${{ vars.EC2_HOST || 'forestlee.us' }}

jobs:
  build-test-deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Set Evidence build version
        run: echo "VITE_EVIDENCE_SITE_VERSION=deploy-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build static app
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_EVIDENCE_API_BASE_URL: ${{ env.VITE_EVIDENCE_API_BASE_URL }}
          VITE_EVIDENCE_AUTH_MODE: ${{ env.VITE_EVIDENCE_AUTH_MODE }}
          VITE_AWS_REGION: ${{ env.VITE_AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ env.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ env.VITE_COGNITO_USER_POOL_CLIENT_ID }}
          VITE_EVIDENCE_SITE_VERSION: ${{ env.VITE_EVIDENCE_SITE_VERSION }}

      - name: Login to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            --file Dockerfile.runtime \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

      - name: Configure SSH
        env:
          EC2_HOST: ${{ env.EC2_DEPLOY_HOST }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${EC2_HOST}" ]; then
            echo "::error::Missing required secret EC2_HOST."
            exit 1
          fi
          if [ -z "${EC2_SSH_PRIVATE_KEY}" ]; then
            echo "::error::Missing required secret EC2_SSH_PRIVATE_KEY."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ env.EC2_DEPLOY_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i ~/.ssh/ec2_deploy_key "${EC2_USER}@${EC2_HOST}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            IMAGE_TAG="${GITHUB_SHA}" \
            GHCR_USERNAME="${GHCR_USERNAME}" \
            GHCR_TOKEN="${GHCR_TOKEN}" \
            CONTAINER_NAME="${CONTAINER_NAME}" \
            'flock -w 900 /tmp/forestlee-production-deploy.lock bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail

          IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
          SHORT_TAG="$(printf '%s' "${IMAGE_TAG}" | cut -c1-12)"
          CANDIDATE_NAME="${CONTAINER_NAME}-${SHORT_TAG}"
          NGINX_CONF="/etc/nginx/conf.d/forestlee.us.conf"

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin >/dev/null
          docker pull "${IMAGE_REF}"
          docker logout ghcr.io >/dev/null 2>&1 || true

          docker rm -f "${CANDIDATE_NAME}" >/dev/null 2>&1 || true

          if ! sudo test -f "${NGINX_CONF}"; then
            echo "Missing ${NGINX_CONF}; cannot perform blue/green frontend switch."
            exit 1
          fi

          current_port="$(sudo grep -Eo 'proxy_pass http://127\.0\.0\.1:1808[01];' "${NGINX_CONF}" | head -n 1 | grep -Eo '1808[01]' || true)"
          if [ -z "${current_port}" ]; then
            current_port="18080"
          fi
          if [ "${current_port}" = "18080" ]; then
            candidate_port="18081"
          else
            candidate_port="18080"
          fi
          echo "Current frontend port: ${current_port}; candidate port: ${candidate_port}."

          docker ps --format '{{.ID}} {{.Ports}} {{.Names}}' \
            | awk -v port="${candidate_port}" '$0 ~ "127.0.0.1:" port "->80/tcp" { print $1 }' \
            | xargs -r docker rm -f

          docker run -d \
            --name "${CANDIDATE_NAME}" \
            --restart unless-stopped \
            --label app=hom-central-frontend \
            --label role=frontend \
            --label release="${IMAGE_TAG}" \
            --label frontend-port="${candidate_port}" \
            --log-driver json-file \
            --log-opt max-size=50m \
            --log-opt max-file=3 \
            --add-host=host.docker.internal:host-gateway \
            -p "127.0.0.1:${candidate_port}:80" \
            "${IMAGE_REF}"
          rollback() {
            echo "Deployment failed. Keeping or restoring frontend on port ${current_port}."
            sudo sed -i -E "s#proxy_pass http://127\\.0\\.0\\.1:1808[01];#proxy_pass http://127.0.0.1:${current_port};#g" "${NGINX_CONF}" || true
            sudo nginx -t && sudo systemctl reload nginx || true
            docker logs --tail 100 "${CANDIDATE_NAME}" || true
            docker rm -f "${CANDIDATE_NAME}" >/dev/null 2>&1 || true
          }
          trap rollback ERR

          sleep 3
          for path in / /projects /evidence; do
            curl -fsS "http://127.0.0.1:${candidate_port}${path}" >/dev/null
          done
          if ! curl -fsS "http://127.0.0.1:${candidate_port}/evidence-api/health" >/dev/null; then
            echo "Warning: candidate Evidence API proxy smoke failed; continuing because frontend static routes passed."
          fi

          sudo cp "${NGINX_CONF}" "${NGINX_CONF}.bak.${IMAGE_TAG}"
          sudo sed -i -E "s#proxy_pass http://127\\.0\\.0\\.1:1808[01];#proxy_pass http://127.0.0.1:${candidate_port};#g" "${NGINX_CONF}"
          sudo nginx -t
          sudo systemctl reload nginx

          for path in / /projects /evidence; do
            curl -fsS --resolve forestlee.us:443:127.0.0.1 "https://forestlee.us${path}" >/dev/null
          done
          if ! curl -fsS --resolve forestlee.us:443:127.0.0.1 "https://forestlee.us/evidence-api/health" >/dev/null; then
            echo "Warning: public Evidence API proxy smoke failed after frontend switch; frontend static routes are live."
          fi
          trap - ERR

          docker ps --format '{{.ID}} {{.Ports}} {{.Names}}' \
            | awk -v port="${current_port}" '$0 ~ "127.0.0.1:" port "->80/tcp" { print $1 }' \
            | xargs -r docker rm -f
          docker ps -a --filter label=app=hom-central-frontend --filter status=exited -q | xargs -r docker rm -f
          docker image prune -f --filter "label=app=hom-central-frontend" --filter "until=168h" >/dev/null
          REMOTE_SCRIPT
